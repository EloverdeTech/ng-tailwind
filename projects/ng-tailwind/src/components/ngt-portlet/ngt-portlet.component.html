<div class="w-full {{ ngtStyle.compile(['h', 'color.bg', 'color.text', 'p', 'px', 'py', 'pl', 'pr', 'pt', 'pb', 'm', 'mx', 'my', 'ml', 'mr', 'mt', 'mb', 'shadow']) }}"
    @fadeUp>
    @if (!customLayout()) {
        <ngt-portlet-header [icon]="icon()" [caption]="caption()" [helperText]="helpText()" [helperTitle]="helpTitle()"
            [helperIconColor]="helpIconColor()">
            <div right-header>
                <ng-content select='[right-header]'></ng-content>
            </div>

            <div left-header>
                <ng-content select='[left-header]'></ng-content>
            </div>

            <div header>
                <ng-content select='[header]'></ng-content>
            </div>
        </ngt-portlet-header>
    }

    @if (!customLayout() && withBody()) {
        <ngt-portlet-body>
            <ng-content select='[body]'></ng-content>
        </ngt-portlet-body>
    }

    @if (!customLayout() && withFooter()) {
        <ngt-portlet-footer>
            <div right-footer>
                <ng-content select='[right-footer]'></ng-content>
            </div>

            <div left-footer>
                <ng-content select='[left-footer]'></ng-content>
            </div>

            <div footer>
                <ng-content select='[footer]'></ng-content>
            </div>
        </ngt-portlet-footer>
    }

    <ng-content></ng-content>
</div>

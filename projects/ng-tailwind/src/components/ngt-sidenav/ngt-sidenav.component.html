<div class="flex h-full w-full">
    @if (visible()) {
        <div class="{{ getNavSize() }} {{ ngtStyle.compile(['color.bg', 'h']) }} {{ open() ? 'block' : 'hidden' }} top-auto fixed {{ isMobileView() ? '' : 'sm:static sm:block' }}"
            @fadeDownAnimation #sideMenu>
            <ng-content select='[sideMenu]'></ng-content>
        </div>

        @if (open()) {
            <button (click)="closeMenu()" tabindex="-1"
                class="fixed z-30 inset-0 h-full w-full bg-black opacity-50 cursor-default">
            </button>
        }
    }

    <div class="flex-wrap {{ getContainerSize() }} overflow-auto" #container>
        <ng-content></ng-content>
    </div>
</div>
